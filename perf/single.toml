  { op = "hset",   requests = 10000,  workers = 10, keyspace = 1000,  value_size = 128 },
  { op = "hget",   requests = 10000,  workers = 10, keyspace = 1000,  value_size = 128 },
  { op = "lpush",  requests = 10000,  workers = 10, keyspace = 1000,  value_size = 128 },
  { op = "lpop",   requests = 10000,  workers = 10, keyspace = 1000,  value_size = 128 },
  { op = "sadd",   requests = 10000,  workers = 10, keyspace = 1000,  value_size = 128 },
